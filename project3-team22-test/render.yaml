# render.yaml — Render Blueprint
# Defines both services so Render can auto-configure everything
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API ──────────────────────────────────────────────────────
  - type: web
    name: dragon-boba-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Fill this in on the Render dashboard
      - key: CLIENT_URL
        sync: false          # Fill this in AFTER deploying the frontend (its URL)

  # ── Frontend Static Site ─────────────────────────────────────────────
  - type: web
    name: dragon-boba-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Fill this in AFTER deploying the backend (its URL + /api)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
